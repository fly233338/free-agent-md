name: Refresh catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: write

concurrency:
  group: free-agent-md-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Collect, validate, and publish locally
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          free-agent-md update
          free-agent-md validate

      - name: Commit changed catalog
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- README.md ARCHIVE.md data indexes snapshots)" ]]; then
            echo "No catalog changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md ARCHIVE.md data indexes snapshots
          git commit -m "chore(data): refresh catalog $(date -u +%F)"
          git push
